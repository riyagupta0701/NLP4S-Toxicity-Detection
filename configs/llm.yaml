# Role C — multi-LLM prompting (API-based, no fine-tuning)
# Consumed by nlp4s.llm.*

models:
  - name: "aya-23"
    provider: "cohere"          # uses COHERE_API_KEY
    model_id: "c4ai-aya-23-8b"
  - name: "mistral-7b"
    provider: "openai_compatible"  # uses OPENAI_COMPATIBLE_* env vars
    model_id: "mistral-7b-instruct"
  - name: "llama-3-8b"
    provider: "openai_compatible"
    model_id: "llama-3-8b-instruct"

prompting:
  # Conditions to run for RQ3.
  conditions: ["no_explanation", "explanation"]
  shots: 4                       # 0 => zero-shot
  fewshot_selection: "random"    # random | bm25 | target_group
  temperature: 0.0
  max_tokens: 256
  seed: 42

  # MHC processed dump (written by `nlp4s prep`). Eval + few-shot pool are
  # split deterministically from this; demos never overlap eval rows.
  mhc_path: "data/processed/mhc.jsonl"
  # Optional: Role A's synthetic implicit data is folded into the few-shot
  # pool when it exists, extending coverage to MHC languages with no HASOC.
  synthetic_path: "data/synthetic/implicit.jsonl"

  # Stratified split + subsampling — cap per (language x functionality) cell.
  pool_per_cell: 5
  eval_subsample_per_cell: 25

  # On-disk response cache so prompt iteration does not re-charge for unchanged calls.
  cache_path: "outputs/llm/cache.sqlite"

  predictions_out: "outputs/llm/predictions.jsonl"
